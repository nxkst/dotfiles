# ==================== SETTINGS ====================
set -g prefix M-a
unbind C-b
bind M-a send-prefix

bind -n M-r source-file ~/.tmux.conf \; display "Config reloaded!"

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000
set -g mouse on
set -sg escape-time 0
set -g focus-events on

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"

# Vim-like navigation
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Better splitting (with current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n M-Enter new-window -c "#{pane_current_path}"

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ==================== PLUGINS ====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark'        # try 'dark256' if you have issues

# Session management (very useful for development)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Optional but nice
set -g @plugin 'tmux-plugins/tmux-yank'           # better copying
set -g @plugin 'sainnhe/tmux-fzf'                 # fuzzy finder (Prefix + Tab)

# Continuum settings
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

run '~/.tmux/plugins/tpm/tpm'
