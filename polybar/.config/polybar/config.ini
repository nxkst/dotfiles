include-file = rose-pine.ini

[bar/main]
width = 100%
height = 28

background = ${colors.base}
foreground = ${colors.text}

border-size = 0

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = JetBrainsMono Nerd Font:size=11;3
font-1 = Symbols Nerd Font:size=13;3

modules-left = xworkspaces
modules-center = date
modules-right = xkeyboard cpu memory pulseaudio warp ethernet wifi tray

[module/warp]
type = custom/script

exec = ~/.config/polybar/scripts/warp-status.sh
interval = 3

click-left = warp-cli connect
click-right = warp-cli disconnect

format-padding = 1

[module/cpu]
type = internal/cpu

format-prefix = "󰍛 "
format-prefix-foreground = ${colors.iris}

label = %percentage%%

[module/memory]
type = internal/memory

format-prefix = "󰘚 "
format-prefix-foreground = ${colors.foam}

label = %percentage_used%%

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "󰕾 "
format-volume-prefix-foreground = ${colors.rose}

label-volume = %percentage%%

label-muted = 󰖁 muted
label-muted-foreground = ${colors.muted}

[module/date]
type = internal/date

interval = 1

date = %a %d %b
time = %H:%M

label = %{F#c4a7e7}󰃰 %{F-}%date%  %{F#9ccfd8}󰥔 %{F-}%time%

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.highlight}
label-active-foreground = ${colors.text}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.muted}
label-empty-padding = 1

[module/wifi]
type = internal/network
interface = wlp0s26f7u6

interval = 3

format-connected = <label-connected>
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-padding = 1

label-connected = %{F#9ccfd8}󰤨 %{F#e0def4}%essid% %{F#908caa}(%signal%%)%{F-}

label-disconnected = %{F#eb6f92}󰤭 Disconnected%{F-}

[module/ethernet]
type = internal/network
interface = enp5s0

interval = 3

format-connected = <label-connected>
format-connected-padding = 1

format-disconnected = <label-disconnected>
format-disconnected-padding = 1

label-connected = %{F#3e8fb0}󰈀 %{F#e0def4}LAN%{F-}

label-disconnected = %{F#6e6a86}󰈂%{F-}

[module/tray]
type = internal/tray

format-margin = 6px
tray-spacing = 8px

[module/xkeyboard]
type = internal/xkeyboard

blacklist-0 = caps lock
blacklist-1 = scroll lock
blacklist-2 = num lock

format = <label-layout> <label-indicator>

label-layout = %{F#e0def4}%layout%%{F-}

label-indicator-on = %{F#f6c177}●%{F-}
label-indicator-off =

layout-icon-default = EN
layout-icon-0 = EN
layout-icon-1 = RU

layout-0-foreground = #9ccfd8
layout-1-foreground = #eb6f92

format-padding = 2
