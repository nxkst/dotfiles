include-file = nord.ini

[bar/main]
width = 100%
height = 28pt
offset-x = 0%
offset-y = 0

background = ${colors.bg}
foreground = ${colors.fg}

radius = 0
padding-left = 4
padding-right = 4
module-margin = 1

font-0 = "JetBrains Mono Nerd Font:size=10;2"

modules-left = xworkspaces
modules-center = date
modules-right = pulseaudio separator xkeyboard separator wlan eth separator warp

enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

line-size = 0
border-size = 0

[module/xworkspaces]
type = internal/xworkspaces

label-active = 
label-active-foreground = ${colors.accent}
label-active-padding = 1

label-occupied = 
label-occupied-foreground = ${colors.fg}
label-occupied-padding = 1

label-empty = 
label-empty-foreground = ${colors.muted}
label-empty-padding = 1

label-urgent = 
label-urgent-foreground = ${colors.warn}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-empty = "Desktop"

[module/filesystem]
type = internal/fs
interval = 30

mount-0 = /

label-mounted =   %percentage_used%%
label-foreground = ${colors.secondary}

label-unmounted = not mounted
label-unmounted-foreground = ${colors.muted}

[module/pulseaudio]

type = internal/pulseaudio

format-volume = <ramp-volume>  <label-volume>
label-volume-foreground = ${colors.accent}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
label-muted =  muted
label-muted-foreground = ${colors.muted}

click-right = pavucontrol
scroll-up = pamixer -i 5
scroll-down = pamixer -d 5

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout =   %layout%
label-layout-foreground = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 5

label =   %gb_used%
label-foreground = ${colors.fg}

[module/cpu]
type = internal/cpu
interval = 2

label =   %percentage:2%%
label-foreground = ${colors.warn}

[network-base]
type = internal/network
interval = 5

format-connected = <label-connected>
format-disconnected =  disconnected
label-disconnected-foreground = ${colors.muted}

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected =   %essid%
label-connected-foreground = ${colors.secondary}

[module/eth]
inherit = network-base
interface-type = wired
label-connected =   %local_ip%
label-connected-foreground = ${colors.secondary}

[module/date]
type = internal/date
interval = 1

date =  %d.%m   %H:%M
date-alt =  %d.%m.%Y

label = %date%
label-foreground = ${colors.accent}

[module/separator]
type = custom/text
content = "│"
content-foreground = ${colors.gray}

[module/warp]
type = custom/script
exec = ~/.config/polybar/scripts/warp-status.sh
interval = 5

format-prefix = "󰖂 "
label = %output%

[settings]
screenchange-reload = true
pseudo-transparency = false
