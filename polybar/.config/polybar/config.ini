[colors]
; --- Gruvbox Dark ---
background = #cc282828
background-alt = #32302f
foreground = #ebdbb2

; --- Basic colors ---
black   = #282828
red     = #cc241d
green   = #98971a
yellow  = #d79921
blue    = #458588
purple  = #b16286
aqua    = #689d6a
gray    = #a89984

; --- Bright variants ---
bright-black   = #928374
bright-red     = #fb4934
bright-green   = #b8bb26
bright-yellow  = #fabd2f
bright-blue    = #83a598
bright-purple  = #d3869b
bright-aqua    = #8ec07c
bright-gray    = #ebdbb2

; --- Accent / UI ---
primary = #d79921
secondary = #458588
alert = #cc241d
disabled = #7c6f64

; =========================
; LEFT BAR (workspaces + window)
; =========================
[bar/left]
width = 33%
height = 20pt
offset-x = 0%

background = ${colors.background}
foreground = ${colors.foreground}

radius = 6
padding-left = 1
padding-right = 1

font-0 = "Iosevka Nerd Font:size=10"

modules-left = xworkspaces
modules-right = xwindow

enable-ipc = true

; =========================
; CENTER BAR (date)
; =========================
[bar/center]
width = 34%
height = 20pt
offset-x = 33%

background = ${colors.background}
foreground = ${colors.foreground}

radius = 6

font-0 = "Hack Nerd Font:size=10"

modules-center = date

enable-ipc = true


; =========================
; RIGHT BAR (system info)
; =========================
[bar/right]
width = 33%
height = 20pt
offset-x = 67%

background = ${colors.background}
foreground = ${colors.foreground}

radius = 6
padding-left = 1
padding-right = 1

font-0 = "Hack Nerd Font:size=10"

modules-left = filesystem blank pulseaudio blank xkeyboard
modules-center = memory blank cpu
modules-right = wlan blank eth
;modules-center = filesystem pulseaudio xkeyboard memory cpu wlan eth

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html
[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %d.%m -- %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[module/blank]
type = custom/text
content = " "
content-padding = 1

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
