include-file = rose-pine-moon.ini

[bar/main]
width = 100%
height = 28pt

background = ${colors.background}
foreground = ${colors.foreground}

radius = 0
padding-left = 3
padding-right = 3
module-margin = 1

line-size = 0
border-size = 0

font-0 = "JetBrains Mono Nerd Font:size=10;2"

modules-left = xworkspaces separator xwindow
modules-center = date
modules-right = filesystem separator pulseaudio separator xkeyboard separator memory separator cpu separator wlan eth

enable-ipc = true

cursor-click = pointer
cursor-scroll = ns-resize

[module/xworkspaces]
type = internal/xworkspaces

label-active = 
label-active-foreground = ${colors.primary}
label-active-padding = 1

label-occupied = 
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-empty = 
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

label-urgent = 
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow

label = %title:0:60:...%
label-empty = "Desktop"

label-foreground = ${colors.background-alt}

[module/filesystem]
type = internal/fs
interval = 30

mount-0 = /

label-mounted =  %percentage_used%%
label-mounted-foreground = ${colors.secondary}

label-unmounted = not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%
label-volume-foreground = ${colors.primary}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.primary}

label-muted =  muted
label-muted-foreground = ${colors.disabled}

click-right = pavucontrol
scroll-up = pamixer -i 5
scroll-down = pamixer -d 5

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout =  %layout%
label-layout-foreground = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 5

format = <label>
format-foreground = ${colors.foreground}

label =  %gb_used%
label-foreground = ${colors.secondary}

[module/cpu]
type = internal/cpu
interval = 2

label =  %percentage:2%%
label-foreground = ${colors.alert}

[network-base]
type = internal/network
interval = 5

format-connected = <label-connected>

format-disconnected =  offline
format-disconnected-foreground = ${colors.disabled}

[module/wlan]
inherit = network-base
interface-type = wireless

label-connected =  %essid%
label-connected-foreground = ${colors.secondary}

[module/eth]
inherit = network-base
interface-type = wired

label-connected =  %local_ip%
label-connected-foreground = ${colors.secondary}

[module/date]
type = internal/date
interval = 1

date =  %d.%m   %H:%M
date-alt =  %d.%m.%Y

label = %date%
label-foreground = ${colors.primary}

[module/separator]
type = custom/text

content = "│"
content-foreground = ${colors.background-alt}

[settings]
screenchange-reload = true
pseudo-transparency = false
