backend = "glx";
vsync = true;
use-damage = true;
xrender-sync-fence = true;

detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;

unsubshape = false;
dithered-present = false;

log-level = "warn";

fading = false;

shadow = true;
shadow-radius = 20;
shadow-opacity = 0.35;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-color = "#00020b";

corner-radius = 8;
inner-border-width = 1;

blur-method = "dual_kawase";
blur-strength = 5;

blur-background = true;
blur-background-frame = true;

rules = (

        {
        match = "class_g = 'Alacritty'";
        opacity = 0.85;
        },

        {
        match = "class_g = 'Dunst'";
        corner-radius = 0;
        },

        {
        match = "window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'menu'";
        opacity = 0.9;
        },

        {
        match = "class_g = 'Rofi'";
        corner-radius = 0;
        opacity = 1;
        },

        {
            match = "window_type = 'dock' || window_type = 'desktop'";
            opacity = 0.9;
            corner-radius = 5;
        },

        {
            match = "class_g = 'Polybar'";
            corner-radius = 0;
            opacity = 1;
        },

        {
            match = "class_g *= 'i3lock' || fullscreen";
            shadow = false;
            corner-radius = 0;
        }
);
