shadow = true;
shadow-radius = 50;
shadow-opacity = .35
shadow-offset-x = -49;
shadow-offset-y = -47;
shadow-color = "#00020b"

#frame-opacity = 0.9;
#frame-opacity-for-same-colors = true;

inner-border-width = 1

corner-radius = 13

blur-method = "dual_kawase"
blur-background = true
blur-background-frame = true

backend = "glx"
dithered-present = false;
vsync = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true
#glx-no-stencil = true
#glx-no-rebind-pixmap = true
use-damage = true;
xrender-sync-fence = true
log-level = "warn";

rules = ({
        match = "class_g = 'Alacritty'";
        opacity = 0.85;
        },{
        match = "WM_TRANSIENT_FOR@";
        animations = ({
                triggers = ["open", "show"];
                opacity = {
                curve = "linear";
                duration = 0.09;
                start = "window-raw-opacity-before";
                end = "window-raw-opacity";
                };
                blur-opacity = {
                curve = "linear";
                duration = 0.1;
                delay = 0.15;
                start = "window-raw-opacity-before";
                end = "window-raw-opacity";
                };
                shadow-opacity = "opacity";
                scale-y = {
                curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
                duration = 0.09;
                start = 0.8;
                end = 1;
                };
                offset-y = "(-window-height/2) + (window-height/2) * scale-y";
                shadow-scale-y = "scale-y";
                shadow-offset-y = "offset-y";
        },{
            triggers = ["close", "hide"];
            opacity = {
                curve = "linear";
                duration = 0.09;
                start = "window-raw-opacity-before";
                end = "0";
            };
            blur-opacity = 0;
            shadow-opacity = "opacity";
            scale-y = {
                curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
                duration = 0.09;
                start = 1;
                end = 0.7;
            };
            offset-y = "(-window-height/2) + (window-height/2) * scale-y";
            shadow-scale-y = "scale-y";
            shadow-offset-y = "offset-y";
        });
        }, {
            match = "window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'menu'";
            animations = ({
                    triggers = ["open", "show"];
                    opacity = {
                    curve = "linear";
                    duration = 0.09;
                    start = "window-raw-opacity-before";
                    end = "window-raw-opacity";
                    };
                    blur-opacity = {
                    curve = "linear";
                    duration = 0.1;
                    delay = 0.15;
                    start = "window-raw-opacity-before";
                    end = "window-raw-opacity";
                    };
                    shadow-opacity = "opacity";
                    scale-y = {
                    curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
                    duration = 0.09;
                    start = 0.8;
                    end = 1;
                    };
                    shadow-scale-y = "scale-y";
            },{
                triggers = ["close", "hide"];
                opacity = {
                    curve = "linear";
                    duration = 0.09;
                    start = "window-raw-opacity-before";
                    end = "0";
                };
                blur-opacity = 0;
                shadow-opacity = "opacity";
                scale-y = {
                    curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
                    duration = 0.09;
                    start = 1;
                    end = 0.7;
                };
                shadow-scale-y = "scale-y";
            });
        }, {
            match = "window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'menu'";
            opacity = 0.9;
        }, {
            match = "window_type = 'dock' || window_type = 'desktop'";
            blur-background = false;
            corner-radius = 0;
        }, {
            match = "class_g *= 'i3lock' || _NET_WM_STATE@[1] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[2] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[3] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[4] = '_NET_WM_STATE_FULLSCREEN'";
            shadow = false;
            corner-radius = 0;
            animations = ({
                    triggers = ["open", "show"];
                    opacity = {
                    curve = "linear";
                    duration = 0.09;
                    start = "window-raw-opacity-before";
                    end = "window-raw-opacity";
                    };
                    blur-opacity = {
                    curve = "linear";
                    duration = 0.1;
                    delay = 0.15;
                    start = "window-raw-opacity-before";
                    end = "window-raw-opacity";
                    };
                    shadow-opacity = "opacity";
                    },{
                    triggers = ["close", "hide"];
                    opacity = {
                    curve = "linear";
                    duration = 0.09;
                    start = "window-raw-opacity-before";
                    end = "0";
                    };
                    blur-opacity = 0;
                    shadow-opacity = "opacity";
                    });
        });

animations = false; 
